spring:
  application:
    name: growth-profile
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/growth_profile?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8082

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

hbase:
  zookeeper:
    quorum: 47.111.23.147
    port: 2181

rocketmq:
  name-server: localhost:9876
  producer:
    group: profile-producer-group
    send-message-timeout: 3000

clickhouse:
  url: jdbc:ch://localhost:8123/default
  username: default
  password: ""

sync:
  hbase-to-clickhouse:
    cron: "0 0 2 * * ?"
    batch-size: 5000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
