spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

hbase:
  zookeeper:
    quorum: localhost
    port: 2181

rocketmq:
  name-server: localhost:9876
  producer:
    group: profile-producer-group
    send-message-timeout: 3000
