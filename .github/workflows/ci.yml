name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install growth-platform-bom
        run: |
          git clone --depth 1 https://github.com/yuhang94/growth-platform-bom.git /tmp/growth-platform-bom
          mvn -f /tmp/growth-platform-bom/pom.xml install -B -q

      - name: Install growth-common
        run: |
          git clone --depth 1 https://github.com/yuhang94/growth-common.git /tmp/growth-common
          mvn -f /tmp/growth-common/pom.xml install -B -q -DskipTests

      - name: Build and Unit Test
        run: mvn clean verify -B

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install growth-platform-bom
        run: |
          git clone --depth 1 https://github.com/yuhang94/growth-platform-bom.git /tmp/growth-platform-bom
          mvn -f /tmp/growth-platform-bom/pom.xml install -B -q

      - name: Install growth-common
        run: |
          git clone --depth 1 https://github.com/yuhang94/growth-common.git /tmp/growth-common
          mvn -f /tmp/growth-common/pom.xml install -B -q -DskipTests

      - name: Integration Test
        run: mvn clean verify -B -Pit -DskipTests

      - name: Upload Failsafe Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/'
          retention-days: 7
